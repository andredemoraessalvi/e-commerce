<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F; --surface: #12121A; --border: #2A2A3E;
    --accent: #6C63FF; --text: #E8E8F0; --muted: #7A7A9A; --dim: #4A4A6A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,15,.95); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border); padding:0 2rem;
  }
  .header-inner {
    max-width:1200px; margin:0 auto; height:64px;
    display:flex; align-items:center; gap:1.5rem;
  }
  .logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem;
    display:flex; align-items:center; gap:7px; flex-shrink:0;
  }
  .logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; }
  .search-bar {
    flex:1; max-width:460px; display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:50px; padding:0 1rem; transition:border-color .2s;
  }
  .search-bar:focus-within { border-color:var(--accent); }
  .search-bar input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:inherit; font-size:.9rem; padding:9px 0;
  }
  .search-bar input::placeholder { color:var(--dim); }
  .cart-btn {
    margin-left:auto; position:relative; width:40px; height:40px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center;
    transition:border-color .2s;
  }
  .cart-btn:hover { border-color:var(--accent); }
  .cart-badge {
    position:absolute; top:-4px; right:-4px;
    background:var(--accent); color:#fff; font-size:.6rem; font-weight:700;
    width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .cart-badge.hidden { display:none; }

  /* GRID */
  .content { max-width:1200px; margin:0 auto; padding:2rem; }
  .result-info { font-size:.82rem; color:var(--muted); margin-bottom:1.25rem; }
  .result-info strong { color:var(--text); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }

  /* CARD */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    overflow:hidden; transition:transform .2s, border-color .2s, box-shadow .2s;
  }
  .card:hover { transform:translateY(-4px); border-color:rgba(108,99,255,.5); box-shadow:0 12px 32px rgba(108,99,255,.12); }
  .card-img {
    height:160px; background:#1C1C28;
    display:flex; align-items:center; justify-content:center; font-size:3.5rem;
  }
  .card-body { padding:.9rem; }
  .card-cat { font-size:.65rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
  .card-name { font-family:'Syne',sans-serif; font-size:.9rem; font-weight:700; line-height:1.3; margin-bottom:4px; }
  .card-brand { font-size:.75rem; color:var(--muted); margin-bottom:.75rem; }
  .card-desc {
    font-size:.78rem; color:var(--muted); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-footer { padding:.75rem .9rem .9rem; }
  .btn-add {
    width:100%; padding:9px; background:var(--accent); border:none; border-radius:8px;
    color:#fff; font-family:'Syne',sans-serif; font-size:.82rem; font-weight:700;
    cursor:pointer; transition:background .2s;
  }
  .btn-add:hover { background:#5A52E0; }

  /* EMPTY */
  .empty { grid-column:1/-1; text-align:center; padding:4rem 1rem; color:var(--muted); }
  .empty div:first-child { font-size:3rem; opacity:.3; margin-bottom:1rem; }

  /* CART PANEL */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
    z-index:200; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .overlay.open { opacity:1; pointer-events:all; }
  .panel {
    position:fixed; top:0; right:0; bottom:0; width:380px;
    background:var(--surface); border-left:1px solid var(--border);
    z-index:201; display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  .overlay.open .panel { transform:translateX(0); }
  .panel-header {
    padding:1.25rem 1.5rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
  .btn-close {
    width:30px; height:30px; background:#1C1C28; border:1px solid var(--border);
    border-radius:7px; cursor:pointer; color:var(--muted); font-size:.9rem;
    display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .btn-close:hover { background:#FF6584; border-color:#FF6584; color:#fff; }
  .panel-items { flex:1; overflow-y:auto; padding:1rem; }
  .cart-item {
    display:grid; grid-template-columns:44px 1fr auto; gap:.75rem; align-items:center;
    background:#1C1C28; border:1px solid var(--border); border-radius:10px;
    padding:.75rem; margin-bottom:.75rem;
  }
  .item-emoji { font-size:1.6rem; text-align:center; }
  .item-name { font-size:.85rem; font-weight:500; }
  .item-sub { font-size:.75rem; color:var(--muted); margin-top:2px; }
  .qty-controls { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .qty-btn {
    width:22px; height:22px; background:var(--bg); border:1px solid var(--border);
    border-radius:5px; cursor:pointer; color:var(--text); font-size:.85rem;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .qty-btn:hover { background:var(--accent); border-color:var(--accent); }
  .qty-val { font-size:.82rem; font-weight:600; }
  .cart-empty { text-align:center; padding:3rem 1rem; color:var(--dim); }
  .cart-empty div:first-child { font-size:2.5rem; opacity:.3; margin-bottom:.75rem; }
  .panel-footer { padding:1.25rem 1.5rem; border-top:1px solid var(--border); }
  .items-count { font-size:.82rem; color:var(--muted); margin-bottom:.75rem; }
  .btn-checkout {
    width:100%; padding:13px; background:var(--accent); border:none; border-radius:10px;
    color:#fff; font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700;
    cursor:pointer; transition:background .2s;
  }
  .btn-checkout:hover { background:#5A52E0; }
  .btn-checkout:disabled { background:#1C1C28; color:var(--dim); cursor:not-allowed; }

  /* NOTIFICATION */
  .notif {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--accent); color:#fff; padding:10px 22px; border-radius:50px;
    font-size:.85rem; z-index:300; opacity:0; pointer-events:none;
    transition:all .25s; white-space:nowrap;
  }
  .notif.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div>NEXUS</div>
    <div class="search-bar">
      <span style="color:var(--dim)">🔍</span>
      <input id="search" type="text" placeholder="Buscar produtos, marcas...">
    </div>
    <button class="cart-btn" id="cartBtn">
      🛒<span class="cart-badge hidden" id="badge">0</span>
    </button>
  </div>
</header>

<div class="content">
  <div class="result-info" id="info"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeCart(event)">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">🛒 Carrinho</span>
      <button class="btn-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="panel-items" id="cartItems"></div>
    <div class="panel-footer">
      <div class="items-count" id="itemsCount"></div>
      <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">💳 Finalizar Pedido</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const EXCEL_FILE  = 'https://docs.google.com/spreadsheets/d/ID/export?format=xlsx';
const N8N_WEBHOOK = 'Minha URL';

const EMOJIS = {
  Computadores:'💻', Celulares:'📱', Áudio:'🎧', TVs:'📺', Câmeras:'📷', Wearables:'⌚',
  Calçados:'👟', Acessórios:'🎒', Roupas:'👕', Ciclismo:'🚴', Nutrição:'💪',
  Móveis:'🛋️', Eletrodomésticos:'☕', Decoração:'💡', Tecnologia:'📚',
  Fragrâncias:'🧴', PS5:'🎮'
};

let products = [], cart = [], query = '';

async function loadProducts() {
  document.getElementById('info').textContent = '⏳ Carregando catálogo...';
  try {
    const buf  = await (await fetch(EXCEL_FILE)).arrayBuffer();
    const wb   = XLSX.read(buf, { type:'array' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['Produtos'], { defval:null });
    products   = rows.map(r => ({
      id:     Number(r['ID']),
      nome:   r['Nome']         || '',
      cat:    r['Categoria']    || '',
      subcat: r['Subcategoria'] || '',
      marca:  r['Marca']        || '',
      desc:   r['Descrição']    || '',
    })).filter(p => p.id && p.nome);
    render();
  } catch(e) {
    document.getElementById('info').textContent = '⚠️ Erro ao carregar produtos.';
    console.error(e);
  }
}

function render() {
  const list = products.filter(p =>
    !query ||
    p.nome.toLowerCase().includes(query) ||
    p.marca.toLowerCase().includes(query) ||
    p.cat.toLowerCase().includes(query)
  );
  document.getElementById('info').innerHTML =
    `<strong>${list.length}</strong> produto${list.length !== 1 ? 's' : ''} encontrado${list.length !== 1 ? 's' : ''}`;
  document.getElementById('grid').innerHTML = list.length
    ? list.map(p => `
        <div class="card">
          <div class="card-img">${EMOJIS[p.subcat] || '📦'}</div>
          <div class="card-body">
            <div class="card-cat">${p.cat} · ${p.subcat}</div>
            <div class="card-name">${p.nome}</div>
            <div class="card-brand">${p.marca}</div>
            <div class="card-desc">${p.desc}</div>
          </div>
          <div class="card-footer">
            <button class="btn-add" onclick="addToCart(${p.id})">🛒 Adicionar</button>
          </div>
        </div>`).join('')
    : `<div class="empty"><div>🔍</div><div>Nenhum produto encontrado</div></div>`;
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const item = cart.find(x => x.id === id);
  if (item) item.qty++; else cart.push({ ...p, qty:1 });
  updateBadge();
  renderCart();
  notify(`✓ ${p.nome} adicionado`);
}

function changeQty(id, d) {
  const i = cart.findIndex(x => x.id === id);
  if (i < 0) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateBadge();
  renderCart();
}

function updateBadge() {
  const n = cart.reduce((s, x) => s + x.qty, 0);
  document.getElementById('badge').textContent = n;
  document.getElementById('badge').classList.toggle('hidden', n === 0);
}

function renderCart() {
  const total = cart.reduce((s, x) => s + x.qty, 0);
  document.getElementById('itemsCount').textContent =
    total ? `${total} item${total !== 1 ? 's' : ''} no carrinho` : '';
  document.getElementById('checkoutBtn').disabled = !total;
  document.getElementById('cartItems').innerHTML = cart.length
    ? cart.map(item => `
        <div class="cart-item">
          <div class="item-emoji">${EMOJIS[item.subcat] || '📦'}</div>
          <div>
            <div class="item-name">${item.nome}</div>
            <div class="item-sub">${item.marca} · qtd: ${item.qty}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          </div>
        </div>`).join('')
    : `<div class="cart-empty"><div>🛒</div><div>Carrinho vazio</div></div>`;
}

async function checkout() {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        pedido_id:   `PED-${Date.now()}`,
        data_hora:   new Date().toISOString(),
        total_itens: cart.reduce((s, x) => s + x.qty, 0),
        itens: cart.map(({ id, nome, cat, subcat, marca, qty }) =>
          ({ id, nome, categoria:cat, subcategoria:subcat, marca, quantidade:qty })
        ),
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    notify('🎉 Pedido enviado com sucesso!');
    cart = [];
    updateBadge();
    renderCart();
    toggleCart();
  } catch(e) {
    notify('❌ Erro ao enviar pedido. Tente novamente.');
    btn.disabled = false;
    btn.textContent = '💳 Finalizar Pedido';
  }
}

function toggleCart() { document.getElementById('overlay').classList.toggle('open'); }
function closeCart(e) { if (e.target === document.getElementById('overlay')) toggleCart(); }

let notifTimer;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('cartBtn').addEventListener('click', toggleCart);
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.toLowerCase().trim();
  render();
});

loadProducts();
</script>
</body>
</html>
