<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splendi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F5F7; --surface:#FFFFFF; --surface2:#F0F0F3; --border:#E0E0E5;
    --accent:#E85D26; --accent-h:#C94E1E; --text:#1A1A1A; --muted:#666666; --dim:#AAAAAA;
    --sidebar:220px;
    --grad:linear-gradient(135deg,#9B30FF 0%,#3B82F6 25%,#22C55E 50%,#EAB308 75%,#E85D26 100%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }

  /* ── LOGIN ─────────────────────────────────────────────────── */
  #loginScreen {
    position:fixed; inset:0; background:var(--bg);
    display:flex; align-items:center; justify-content:center; z-index:999;
  }
  #loginScreen.hidden { display:none; }
  .login-box {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:2.5rem 2rem; width:100%; max-width:360px;
    border-top:2px solid transparent;
    background-clip:padding-box;
    position:relative;
  }
  .login-box::before {
    content:''; position:absolute; top:-2px; left:0; right:0; height:2px;
    background:var(--grad); border-radius:16px 16px 0 0;
  }
  .login-logo {
    display:flex; align-items:center; gap:10px; margin-bottom:2rem;
  }
  .login-logo-dot { display:none; }
  .login-title { font-family:'Inter',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:.4rem; }
  .login-sub { font-size:.82rem; color:var(--muted); margin-bottom:1.75rem; }
  .login-field { margin-bottom:1rem; }
  .login-field label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:5px; }
  .login-field input {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:9px;
    padding:10px 13px; color:var(--text); font-family:inherit; font-size:.9rem; outline:none;
    transition:border-color .2s;
  }
  .login-field input:focus { border-color:var(--accent); }
  .login-error { font-size:.78rem; color:#FF6584; margin-bottom:.75rem; min-height:1rem; }
  .btn-login {
    width:100%; padding:12px; background:var(--accent); border:none; border-radius:9px;
    color:#fff; font-family:'Inter',sans-serif; font-size:.95rem; font-weight:600;
    cursor:pointer; transition:background .2s;
  }
  .btn-login:hover { background:var(--accent-h); }

  /* ── APP (oculto até login) ────────────────────────────────── */
  #app { display:none; height:100vh; flex-direction:column; }
  #app.visible { display:flex; }

  /* ── HEADER ────────────────────────────────────────────────── */
  header {
    height:60px; flex-shrink:0;
    background:rgba(255,255,255,.97); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 1.5rem; gap:1rem; z-index:50;
    position:relative;
  }
  header::after {
    content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px;
    background:var(--grad); opacity:.6;
  }
  .logo {
    display:flex; align-items:center; gap:8px; flex-shrink:0;
  }
  .logo-dot { display:none; }
  .search-bar {
    flex:1; max-width:420px; display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:50px; padding:0 1rem; transition:border-color .2s;
  }
  .search-bar:focus-within { border-color:var(--accent); }
  .search-bar input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:inherit; font-size:.88rem; padding:8px 0;
  }
  .search-bar input::placeholder { color:var(--dim); }
  #searchWrap { display:none; }
  #searchWrap.visible { display:flex; flex:1; max-width:420px; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:.75rem; }
  .user-pill {
    display:flex; align-items:center; gap:7px;
    background:var(--surface); border:1px solid var(--border); border-radius:50px;
    padding:5px 12px 5px 6px; font-size:.8rem; color:var(--muted);
  }
  .user-avatar {
    width:24px; height:24px; background:var(--grad); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.7rem; font-weight:700; color:#fff;
  }
  .btn-logout {
    background:none; border:1px solid var(--border); border-radius:8px;
    padding:5px 10px; color:var(--muted); font-size:.75rem; cursor:pointer;
    transition:all .15s;
  }
  .btn-logout:hover { border-color:#FF6584; color:#FF6584; }
  .cart-btn {
    position:relative; width:38px; height:38px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center;
    transition:border-color .2s;
  }
  .cart-btn:hover { border-color:var(--accent); }
  .cart-badge {
    position:absolute; top:-4px; right:-4px;
    background:var(--accent); color:#fff; font-size:.58rem; font-weight:700;
    width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .cart-badge.hidden { display:none; }

  /* ── BODY LAYOUT ───────────────────────────────────────────── */
  .app-body { display:flex; flex:1; overflow:hidden; }

  /* ── SIDEBAR ───────────────────────────────────────────────── */
  aside {
    width:var(--sidebar); flex-shrink:0;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:1.25rem .75rem; gap:4px;
    overflow-y:auto;
  }
  .nav-section-title {
    font-size:.62rem; letter-spacing:2px; text-transform:uppercase;
    color:var(--dim); padding:0 .5rem; margin:1rem 0 .4rem;
  }
  .nav-section-title:first-child { margin-top:0; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 12px; border-radius:9px; cursor:pointer;
    font-size:.85rem; color:var(--muted); transition:all .15s;
    border:1px solid transparent;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active {
    background:rgba(232,93,38,.12); border-color:rgba(232,93,38,.35);
    color:#F0884A;
  }
  .nav-icon { font-size:1rem; width:20px; text-align:center; }
  .nav-divider { height:1px; background:var(--border); margin:.5rem 0; }

  /* ── MAIN CONTENT ──────────────────────────────────────────── */
  main { flex:1; overflow-y:auto; padding:1.75rem; }

  /* PAGE: oculto/visível */
  .page { display:none; }
  .page.active { display:block; }

  .page-title {
    font-family:'Inter',sans-serif; font-size:1.3rem; font-weight:800;
    margin-bottom:.35rem;
  }
  .page-sub { font-size:.82rem; color:var(--muted); margin-bottom:1.5rem; }

  /* ── PEDIDOS FREQUENTES ────────────────────────────────────── */
  .freq-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.25rem;
  }
  .btn-add-all {
    display:flex; align-items:center; gap:7px;
    background:var(--accent); border:none; border-radius:9px;
    padding:9px 16px; color:#fff; font-family:'Inter',sans-serif;
    font-size:.82rem; font-weight:700; cursor:pointer; transition:background .2s;
  }
  .btn-add-all:hover { background:var(--accent-h); }
  .freq-list { display:flex; flex-direction:column; gap:.6rem; }
  .freq-item {
    display:grid; grid-template-columns:48px 1fr auto;
    align-items:center; gap:1rem;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:.9rem 1rem; transition:border-color .2s;
  }
  .freq-item:hover { border-color:rgba(232,93,38,.35); }
  .freq-emoji { font-size:1.8rem; text-align:center; }
  .freq-name { font-size:.9rem; font-weight:500; margin-bottom:2px; }
  .freq-meta { font-size:.75rem; color:var(--muted); }
  .btn-add-one {
    padding:7px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:.8rem; cursor:pointer;
    transition:all .15s; white-space:nowrap;
  }
  .btn-add-one:hover { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* ── PRODUTOS (catálogo) ───────────────────────────────────── */
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:1rem;
  }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    overflow:hidden; transition:transform .2s, border-color .2s, box-shadow .2s;
  }
  .card:hover { transform:translateY(-3px); border-color:rgba(232,93,38,.45); box-shadow:0 10px 30px rgba(232,93,38,.08); }
  .card-img { height:140px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:3rem; }
  .card-body { padding:.85rem; }
  .card-cat { font-size:.62rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
  .card-name { font-family:'Inter',sans-serif; font-size:.88rem; font-weight:700; line-height:1.3; margin-bottom:3px; }
  .card-brand { font-size:.73rem; color:var(--muted); margin-bottom:.6rem; }
  .card-desc { font-size:.76rem; color:var(--muted); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-footer { padding:.65rem .85rem .85rem; }
  .btn-add {
    width:100%; padding:8px; background:var(--accent); border:none; border-radius:8px;
    color:#fff; font-family:'Inter',sans-serif; font-size:.8rem; font-weight:700;
    cursor:pointer; transition:background .2s;
  }
  .btn-add:hover { background:var(--accent-h); }
  .result-info { font-size:.8rem; color:var(--muted); margin-bottom:1.1rem; }
  .result-info strong { color:var(--text); }

  /* ── EMPTY ─────────────────────────────────────────────────── */
  .empty { text-align:center; padding:3.5rem 1rem; color:var(--muted); }
  .empty div:first-child { font-size:2.8rem; opacity:.3; margin-bottom:.75rem; }
  .grid .empty { grid-column:1/-1; }

  /* ── CART PANEL ────────────────────────────────────────────── */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
    z-index:200; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .overlay.open { opacity:1; pointer-events:all; }
  .panel {
    position:fixed; top:0; right:0; bottom:0; width:370px;
    background:var(--surface); border-left:1px solid var(--border);
    z-index:201; display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  .overlay.open .panel { transform:translateX(0); }
  .panel-header {
    padding:1.1rem 1.4rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title { font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; }
  .btn-close {
    width:28px; height:28px; background:var(--surface2); border:1px solid var(--border);
    border-radius:7px; cursor:pointer; color:var(--muted); font-size:.85rem;
    display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .btn-close:hover { background:#FF6584; border-color:#FF6584; color:#fff; }
  .panel-items { flex:1; overflow-y:auto; padding:.9rem; }
  .cart-item {
    display:grid; grid-template-columns:40px 1fr auto; gap:.7rem; align-items:center;
    background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    padding:.7rem; margin-bottom:.65rem;
  }
  .item-emoji { font-size:1.5rem; text-align:center; }
  .item-name { font-size:.83rem; font-weight:500; }
  .item-sub { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .qty-controls { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .qty-btn {
    width:20px; height:20px; background:var(--surface); border:1px solid var(--border);
    border-radius:4px; cursor:pointer; color:var(--text); font-size:.82rem;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .qty-btn:hover { background:var(--accent); border-color:var(--accent); }
  .qty-val { font-size:.8rem; font-weight:600; }
  .cart-empty { text-align:center; padding:2.5rem 1rem; color:var(--dim); }
  .cart-empty div:first-child { font-size:2.2rem; opacity:.3; margin-bottom:.65rem; }
  .panel-footer { padding:1.1rem 1.4rem; border-top:1px solid var(--border); }
  .items-count { font-size:.8rem; color:var(--muted); margin-bottom:.65rem; }
  .btn-checkout {
    width:100%; padding:12px; background:var(--accent); border:none; border-radius:9px;
    color:#fff; font-family:'Inter',sans-serif; font-size:.9rem; font-weight:700;
    cursor:pointer; transition:background .2s;
  }
  .btn-checkout:hover { background:var(--accent-h); }
  .btn-checkout:disabled { background:var(--surface2); color:var(--dim); cursor:not-allowed; }

  /* ── NOTIFICATION ──────────────────────────────────────────── */
  .notif {
    position:fixed; bottom:1.75rem; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--accent); color:#fff; padding:9px 20px; border-radius:50px;
    font-size:.83rem; z-index:400; opacity:0; pointer-events:none;
    transition:all .25s; white-space:nowrap;
  }
  .notif.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="140" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <!-- Ícone flor multicolorido -->
        <g transform="translate(28,30)">
          <circle cx="0" cy="-13" r="6" fill="#9B30FF"/>
          <circle cx="9.2" cy="-9.2" r="6" fill="#6366F1"/>
          <circle cx="13" cy="0" r="6" fill="#3B82F6"/>
          <circle cx="9.2" cy="9.2" r="6" fill="#22C55E"/>
          <circle cx="0" cy="13" r="6" fill="#EAB308"/>
          <circle cx="-9.2" cy="9.2" r="6" fill="#F97316"/>
          <circle cx="-13" cy="0" r="6" fill="#E85D26"/>
          <circle cx="-9.2" cy="-9.2" r="6" fill="#EC4899"/>
          <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
        </g>
        <!-- Texto "splendi" -->
        <text x="52" y="37" font-family="Inter,sans-serif" font-weight="400" font-size="22" fill="#444444" letter-spacing="0.5">splendi</text>
      </svg>
    </div>
    <div class="login-title">Bem-vindo de volta</div>
    <div class="login-sub">Acesso restrito a usuários autorizados.</div>
    <div class="login-field">
      <label>Usuário</label>
      <input id="loginUser" type="text" placeholder="seu.usuario" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     APP
══════════════════════════════════════════════════════ -->
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <svg width="120" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(28,30)">
          <circle cx="0" cy="-13" r="6" fill="#9B30FF"/>
          <circle cx="9.2" cy="-9.2" r="6" fill="#6366F1"/>
          <circle cx="13" cy="0" r="6" fill="#3B82F6"/>
          <circle cx="9.2" cy="9.2" r="6" fill="#22C55E"/>
          <circle cx="0" cy="13" r="6" fill="#EAB308"/>
          <circle cx="-9.2" cy="9.2" r="6" fill="#F97316"/>
          <circle cx="-13" cy="0" r="6" fill="#E85D26"/>
          <circle cx="-9.2" cy="-9.2" r="6" fill="#EC4899"/>
          <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
        </g>
        <text x="52" y="37" font-family="Inter,sans-serif" font-weight="400" font-size="22" fill="#444444" letter-spacing="0.5">splendi</text>
      </svg>
    </div>

    <div id="searchWrap" class="search-bar">
      <span style="color:var(--dim)">🔍</span>
      <input id="search" type="text" placeholder="Buscar produtos, marcas...">
    </div>

    <div class="header-right">
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar"></div>
        <span id="userName"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
      <button class="cart-btn" id="cartBtn">
        🛒<span class="cart-badge hidden" id="badge">0</span>
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside>
      <div class="nav-section-title">Menu</div>

      <div class="nav-item active" id="nav-freq" onclick="goTo('freq')">
        <span class="nav-icon">⭐</span> Pedidos Frequentes
      </div>
      <div class="nav-item" id="nav-catalog" onclick="goTo('catalog')">
        <span class="nav-icon">🛍️</span> Produtos
      </div>

      <div class="nav-divider"></div>
      <div class="nav-section-title">Conta</div>

      <div class="nav-item" onclick="toggleCart()">
        <span class="nav-icon">🛒</span> Ver Carrinho
      </div>
      <div class="nav-item" onclick="doLogout()" style="color:#FF6584">
        <span class="nav-icon">🚪</span> Sair
      </div>
    </aside>

    <!-- MAIN -->
    <main>

      <!-- PÁGINA: PEDIDOS FREQUENTES -->
      <div class="page active" id="page-freq">
        <div class="freq-header">
          <div>
            <div class="page-title">⭐ Pedidos Frequentes</div>
            <div class="page-sub" id="freqSub"></div>
          </div>
          <button class="btn-add-all" onclick="addAllFrequent()">
            ＋ Adicionar tudo ao carrinho
          </button>
        </div>
        <div class="freq-list" id="freqList"></div>
      </div>

      <!-- PÁGINA: CATÁLOGO -->
      <div class="page" id="page-catalog">
        <div class="page-title">🛍️ Produtos</div>
        <div class="page-sub">Catálogo completo disponível para pedido.</div>
        <div class="result-info" id="info"></div>
        <div class="grid" id="grid"></div>
      </div>

    </main>
  </div><!-- /app-body -->
</div><!-- /app -->

<!-- CART PANEL -->
<div class="overlay" id="overlay" onclick="closeCartOutside(event)">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">🛒 Carrinho</span>
      <button class="btn-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="panel-items" id="cartItems"></div>
    <div class="panel-footer">
      <div class="items-count" id="itemsCount"></div>
      <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">💳 Finalizar Pedido</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

// ══════════════════════════════════════════════════════════════
//  CONFIGURAÇÃO
// ══════════════════════════════════════════════════════════════

const EXCEL_FILE  = 'simulacao_splendi.xlsx';
const N8N_WEBHOOK = 'Minha URL';

// Credenciais de acesso por cliente.
// "sheetName" deve ser EXATAMENTE igual ao nome da aba no Excel.
// Adicione/remova entradas conforme os clientes da planilha.
const USERS = [
  { usuario: 'delicci',   senha: '1234', nome: '++ Delicci',              sheetName: '++ Delicci'                },
  { usuario: 'natulce',   senha: '1234', nome: '++ Natulce',              sheetName: '++ Natulce'                },
  { usuario: 'skimil',    senha: '1234', nome: '++ Skimil & Skimoni',     sheetName: '++ Skimil & Skimoni'       },
  { usuario: 'frutibom',  senha: '1234', nome: 'A C Alves Lopes | Frutibom', sheetName: 'A C Alves Lopes | Frutibom' },
  // Para adicionar novo cliente, copie uma linha acima e ajuste os campos.
];

// ══════════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════════════════════

let workbook    = null;   // workbook XLSX carregado (reutilizado nas duas páginas)
let products    = [];     // catálogo completo vindo da aba "Matriz DR"
let frequent    = [];     // pedidos frequentes da aba do cliente logado
let cart        = [];
let query       = '';
let currentUser = null;

// ══════════════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════

function doLogin() {
  const u    = document.getElementById('loginUser').value.trim().toLowerCase();
  const p    = document.getElementById('loginPass').value;
  const user = USERS.find(x => x.usuario === u && x.senha === p);
  if (!user) {
    document.getElementById('loginError').textContent = 'Usuário ou senha incorretos.';
    return;
  }
  currentUser = user;
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('userName').textContent  = user.nome;
  document.getElementById('userAvatar').textContent = user.nome[0].toUpperCase();
  loadExcel();
}

function doLogout() {
  currentUser = workbook = null;
  products = frequent = cart = [];
  query = '';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('overlay').classList.remove('open');
  updateBadge();
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ══════════════════════════════════════════════════════════════
//  NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════

function goTo(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${page}`).classList.add('active');
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  const isSearch = page === 'catalog';
  document.getElementById('searchWrap').classList.toggle('visible', isSearch);
  if (!isSearch) { query = ''; document.getElementById('search').value = ''; }
}

// ══════════════════════════════════════════════════════════════
//  CARREGAR EXCEL  (uma única requisição, duas abas lidas)
// ══════════════════════════════════════════════════════════════

async function loadExcel() {
  setStatus('⏳ Carregando dados...');
  try {
    const buf = await (await fetch(EXCEL_FILE)).arrayBuffer();
    workbook  = XLSX.read(buf, { type: 'array' });
    parseMatrizDR();
    parseClienteSheet();
    renderFrequent();
    renderCatalog();
  } catch(e) {
    setStatus('⚠️ Erro ao carregar a planilha. Verifique o link e o acesso.');
    console.error(e);
  }
}

function setStatus(msg) {
  document.getElementById('info').textContent    = msg;
  document.getElementById('freqSub').textContent = msg;
}

// ── ABA "Matriz DR" → catálogo completo ───────────────────────
// Cabeçalho na LINHA 2 (índice 1); lemos passando header:1 manualmente.
function parseMatrizDR() {
  const sheet = workbook.Sheets['Matriz DR'];
  if (!sheet) { console.warn('Aba "Matriz DR" não encontrada.'); return; }

  // range começa na linha 2 (header) — forçamos via sheet_to_json com header numérico
  // e depois tratamos a primeira linha como cabeçalho.
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  // Linha 1 (índice 1) = cabeçalhos reais
  const headers = raw[1] ? raw[1].map(h => String(h).trim()) : [];

  // Linhas a partir do índice 2 = dados
  products = raw.slice(2)
    .map(row => {
      const r = {};
      headers.forEach((h, i) => r[h] = row[i] ?? '');
      return r;
    })
    .filter(r => r['Material'] && r['Texto breve material'])
    .map(r => ({
      codigo:    String(r['Material']).trim(),
      nome:      String(r['Texto breve material']).trim(),
      cliente:   String(r['Cliente']).trim(),
      razao:     String(r['Razão Social']).trim(),
      preco:     r['Montante de condição'],
      moeda:     String(r['Moeda']).trim(),
      minVenda:  r['Min. Venda (kg)'],
      embalagem: String(r['Embalagem']).trim(),
      qtdEmb:    r['Quantidade embalagem'],
      leadTime:  r['Lead Time (dias)'],
      ncm:       String(r['NCM']).trim(),
      validade:  r['Validade(em meses)'],
      setor:     String(r['Setor de atividade material']).trim(),
      equipe:    String(r['Equipe de vendas']).trim(),
    }));
}

// ── ABA DO CLIENTE → pedidos frequentes ───────────────────────
// Cabeçalho na LINHA 8 (índice 7).
function parseClienteSheet() {
  const sheet = workbook.Sheets[currentUser.sheetName];
  if (!sheet) {
    console.warn(`Aba "${currentUser.sheetName}" não encontrada na planilha.`);
    frequent = [];
    return;
  }

  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  // Linha 8 (índice 7) = cabeçalhos
  const headers = raw[7] ? raw[7].map(h => String(h).trim()) : [];

  // Linhas a partir do índice 8 = dados
  frequent = raw.slice(8)
    .map(row => {
      const r = {};
      headers.forEach((h, i) => r[h] = row[i] ?? '');
      return r;
    })
    .filter(r => r['Produto'] || r['Código para colar no sistema'])
    .map((r, i) => ({
      // Usamos o código SAP como ID único; fallback para índice se não existir
      id:          String(r['Código para colar no sistema']).trim() || `freq-${i}`,
      produto:     String(r['Produto']).trim(),
      familia:     String(r['Família']).trim(),
      embalagem:   String(r['Embalagem']).trim(),
      kg:          r[' kg '] ?? r['kg'] ?? '',
      qntSugerida: r['QNT'] || 1,
      notas:       String(r['Notas']).trim(),
      precoKg:     r['Preço/kg']  ?? '',
      precoEmb:    r['Preço/embalagem'] ?? '',
      desconto:    r['Desconto']  ?? '',
      descGrupo:   String(r['Desc Grupo']).trim(),
    }));
}

// ══════════════════════════════════════════════════════════════
//  PÁGINA: PEDIDOS FREQUENTES
// ══════════════════════════════════════════════════════════════

function renderFrequent() {
  document.getElementById('freqSub').textContent =
    `${frequent.length} produto${frequent.length !== 1 ? 's' : ''} do seu histórico de pedidos.`;

  document.getElementById('freqList').innerHTML = frequent.length
    ? frequent.map(p => `
        <div class="freq-item">
          <div class="freq-emoji">📦</div>
          <div>
            <div class="freq-name">${p.produto || p.id}</div>
            <div class="freq-meta">
              ${p.familia ? `<span>${p.familia}</span>` : ''}
              ${p.embalagem ? ` · ${p.embalagem}` : ''}
              ${p.kg ? ` · ${p.kg} kg` : ''}
              ${p.notas ? ` · <em>${p.notas}</em>` : ''}
            </div>
          </div>
          <button class="btn-add-one" onclick="addFreqToCart('${p.id}')">+ Adicionar</button>
        </div>`).join('')
    : `<div class="empty"><div>⭐</div><div>Nenhum pedido frequente encontrado na aba <strong>${currentUser.sheetName}</strong>.</div></div>`;
}

function addAllFrequent() {
  if (!frequent.length) return;
  frequent.forEach(p => addFreqToCartSilent(p));
  updateBadge();
  renderCart();
  notify(`✓ ${frequent.length} produto${frequent.length !== 1 ? 's adicionados' : ' adicionado'} ao carrinho`);
}

function addFreqToCart(id) {
  const p = frequent.find(x => x.id === id);
  if (!p) return;
  addFreqToCartSilent(p);
  updateBadge();
  renderCart();
  notify(`✓ ${p.produto || p.id} adicionado`);
}

function addFreqToCartSilent(p) {
  const item = cart.find(x => x.id === p.id);
  if (item) item.qty += (Number(p.qntSugerida) || 1);
  else cart.push({
    id:        p.id,
    nome:      p.produto || p.id,
    familia:   p.familia,
    embalagem: p.embalagem,
    kg:        p.kg,
    precoKg:   p.precoKg,
    precoEmb:  p.precoEmb,
    desconto:  p.desconto,
    qty:       Number(p.qntSugerida) || 1,
    origem:    'frequente',
  });
}

// ══════════════════════════════════════════════════════════════
//  PÁGINA: CATÁLOGO (Matriz DR)
// ══════════════════════════════════════════════════════════════

function renderCatalog() {
  const list = products.filter(p =>
    !query ||
    p.nome.toLowerCase().includes(query) ||
    p.codigo.toLowerCase().includes(query) ||
    p.setor.toLowerCase().includes(query) ||
    p.embalagem.toLowerCase().includes(query)
  );

  document.getElementById('info').innerHTML =
    `<strong>${list.length}</strong> produto${list.length !== 1 ? 's' : ''} encontrado${list.length !== 1 ? 's' : ''}`;

  document.getElementById('grid').innerHTML = list.length
    ? list.map(p => `
        <div class="card">
          <div class="card-img">📦</div>
          <div class="card-body">
            <div class="card-cat">${p.setor || 'Produto'}${p.equipe ? ' · ' + p.equipe : ''}</div>
            <div class="card-name">${p.nome}</div>
            <div class="card-brand">Cód: ${p.codigo}${p.embalagem ? ' · ' + p.embalagem : ''}</div>
            <div class="card-desc">
              ${p.minVenda ? `Mín: ${p.minVenda} kg` : ''}
              ${p.leadTime ? ` · Lead: ${p.leadTime}d` : ''}
              ${p.ncm ? ` · NCM: ${p.ncm}` : ''}
            </div>
          </div>
          <div class="card-footer">
            <button class="btn-add" onclick="addCatalogToCart('${p.codigo}')">🛒 Adicionar</button>
          </div>
        </div>`).join('')
    : `<div class="empty"><div>🔍</div><div>Nenhum produto encontrado</div></div>`;
}

function addCatalogToCart(codigo) {
  const p = products.find(x => x.codigo === codigo);
  if (!p) return;
  const item = cart.find(x => x.id === codigo);
  if (item) item.qty++;
  else cart.push({
    id:        p.codigo,
    nome:      p.nome,
    embalagem: p.embalagem,
    kg:        p.minVenda,
    precoKg:   p.preco,
    precoEmb:  '',
    desconto:  '',
    qty:       1,
    origem:    'catalogo',
  });
  updateBadge();
  renderCart();
  notify(`✓ ${p.nome} adicionado`);
}

// ══════════════════════════════════════════════════════════════
//  CARRINHO (compartilhado entre páginas)
// ══════════════════════════════════════════════════════════════

function changeQty(id, d) {
  const i = cart.findIndex(x => x.id === id);
  if (i < 0) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateBadge();
  renderCart();
}

function updateBadge() {
  const n = cart.reduce((s, x) => s + x.qty, 0);
  document.getElementById('badge').textContent = n;
  document.getElementById('badge').classList.toggle('hidden', n === 0);
}

function renderCart() {
  const total = cart.reduce((s, x) => s + x.qty, 0);
  document.getElementById('itemsCount').textContent =
    total ? `${total} item${total !== 1 ? 's' : ''} no carrinho` : '';
  document.getElementById('checkoutBtn').disabled = !total;
  document.getElementById('cartItems').innerHTML = cart.length
    ? cart.map(item => `
        <div class="cart-item">
          <div class="item-emoji">📦</div>
          <div>
            <div class="item-name">${item.nome}</div>
            <div class="item-sub">${item.embalagem || ''} · qtd: ${item.qty}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
          </div>
        </div>`).join('')
    : `<div class="cart-empty"><div>🛒</div><div>Carrinho vazio</div></div>`;
}

// ══════════════════════════════════════════════════════════════
//  CHECKOUT → N8N
// ══════════════════════════════════════════════════════════════

async function checkout() {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  try {
    const res = await fetch(N8N_WEBHOOK, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pedido_id:   `PED-${Date.now()}`,
        data_hora:   new Date().toISOString(),
        usuario:     currentUser.usuario,
        cliente:     currentUser.nome,
        aba_excel:   currentUser.sheetName,
        total_itens: cart.reduce((s, x) => s + x.qty, 0),
        itens: cart.map(({ id, nome, embalagem, kg, precoKg, precoEmb, desconto, qty, origem }) => ({
          codigo: id, nome, embalagem, kg, preco_kg: precoKg,
          preco_embalagem: precoEmb, desconto, quantidade: qty, origem,
        })),
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    notify('🎉 Pedido enviado com sucesso!');
    cart = [];
    updateBadge();
    renderCart();
    toggleCart();
  } catch(e) {
    notify('❌ Erro ao enviar pedido. Tente novamente.');
    btn.disabled = false;
    btn.textContent = '💳 Finalizar Pedido';
  }
}

// ══════════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════════

function toggleCart() { document.getElementById('overlay').classList.toggle('open'); }
function closeCartOutside(e) { if (e.target === document.getElementById('overlay')) toggleCart(); }

let notifTimer;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('cartBtn').addEventListener('click', toggleCart);
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.toLowerCase().trim();
  renderCatalog();
});

</script>
</body>
