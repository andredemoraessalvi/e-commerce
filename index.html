<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Store — Tecnologia & Estilo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --surface: #12121A;
    --surface2: #1C1C28;
    --border: #2A2A3E;
    --accent: #6C63FF;
    --accent2: #FF6584;
    --accent3: #43E97B;
    --text: #E8E8F0;
    --text-muted: #7A7A9A;
    --text-dim: #4A4A6A;
    --gold: #FFD700;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  
  /* HEADER */
  header {
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 2rem;
    height: 64px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.5rem;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .search-bar {
    flex: 1; max-width: 500px;
    display: flex; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; padding: 0 1rem; gap: 8px;
    transition: border-color .2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: .9rem; padding: 8px 0;
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-icon { color: var(--text-dim); font-size: 1rem; }
  .header-actions { display: flex; align-items: center; gap: .75rem; margin-left: auto; }
  .btn-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 1.1rem; transition: all .2s;
    position: relative;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--accent); color: white; font-size: .65rem;
    font-weight: 700; border-radius: 50%; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
  }
  .cart-badge.hidden { display: none; }

  /* LAYOUT */
  .main-layout {
    max-width: 1400px; margin: 0 auto;
    display: grid; grid-template-columns: 260px 1fr;
    gap: 0; min-height: calc(100vh - 64px);
  }

  /* SIDEBAR */
  aside {
    border-right: 1px solid var(--border);
    padding: 2rem 1.5rem;
    position: sticky; top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .filter-section { margin-bottom: 2rem; }
  .filter-title {
    font-family: 'Syne', sans-serif;
    font-size: .7rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 1rem;
  }
  .filter-options { display: flex; flex-direction: column; gap: 4px; }
  .filter-chip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; transition: all .15s;
    border: 1px solid transparent;
    font-size: .85rem;
  }
  .filter-chip:hover { background: var(--surface); }
  .filter-chip.active {
    background: rgba(108,99,255,.15);
    border-color: var(--accent);
    color: #A8A2FF;
  }
  .filter-count {
    font-size: .7rem; color: var(--text-dim);
    background: var(--surface2); padding: 2px 7px;
    border-radius: 20px; font-weight: 500;
  }
  .filter-chip.active .filter-count { background: rgba(108,99,255,.3); color: var(--accent); }

  .price-range { padding: 4px 0; }
  .price-inputs { display: flex; gap: 8px; align-items: center; }
  .price-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-family: inherit; font-size: .8rem; text-align: center; outline: none;
    transition: border-color .2s;
  }
  .price-input:focus { border-color: var(--accent); }
  .price-sep { color: var(--text-dim); font-size: .8rem; }

  .toggle-group { display: flex; flex-direction: column; gap: 6px; }
  .toggle-item {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; padding: 4px 0;
  }
  .toggle-label { font-size: .85rem; color: var(--text-muted); }
  .toggle-switch {
    width: 36px; height: 20px; background: var(--surface2);
    border-radius: 20px; position: relative; transition: background .2s;
    border: 1px solid var(--border);
  }
  .toggle-item.active .toggle-switch { background: var(--accent); border-color: var(--accent); }
  .toggle-switch::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    background: white; border-radius: 50%; top: 2px; left: 2px; transition: left .2s;
  }
  .toggle-item.active .toggle-switch::after { left: 18px; }

  .sort-select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-family: inherit; font-size: .85rem; outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  .sort-select:focus { border-color: var(--accent); }
  .sort-select option { background: var(--surface); }

  .rating-filters { display: flex; flex-direction: column; gap: 4px; }
  .rating-option {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px; cursor: pointer;
    transition: background .15s; font-size: .85rem;
    border: 1px solid transparent;
  }
  .rating-option:hover { background: var(--surface); }
  .rating-option.active { background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.3); }
  .stars { color: var(--gold); font-size: .9rem; }
  .rating-label { color: var(--text-muted); font-size: .8rem; }

  .btn-clear {
    width: 100%; padding: 10px; background: none;
    border: 1px dashed var(--border); border-radius: 8px;
    color: var(--text-dim); font-family: inherit; font-size: .8rem;
    cursor: pointer; transition: all .2s; margin-top: 1rem;
  }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  /* CONTENT */
  .content { padding: 2rem; }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .result-info { font-size: .85rem; color: var(--text-muted); }
  .result-info strong { color: var(--text); font-weight: 500; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 32px; height: 32px; border-radius: 6px;
    background: none; border: 1px solid var(--border);
    cursor: pointer; color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem; transition: all .15s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.25rem;
  }
  .products-grid.list-view { grid-template-columns: 1fr; }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
  }
  .product-card:hover {
    transform: translateY(-4px);
    border-color: rgba(108,99,255,.4);
    box-shadow: 0 12px 40px rgba(108,99,255,.15);
  }
  .card-image {
    width: 100%; height: 180px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; position: relative;
    background: var(--surface2);
    overflow: hidden;
  }
  .card-image::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(18,18,26,.8));
  }
  .badge-destaque {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    background: var(--accent); color: white;
    font-size: .65rem; font-weight: 700; font-family: 'Syne', sans-serif;
    padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-promo {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: var(--accent2); color: white;
    font-size: .65rem; font-weight: 700; font-family: 'Syne', sans-serif;
    padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
  }
  .badge-frete {
    position: absolute; bottom: 42px; left: 10px; z-index: 2;
    background: var(--accent3); color: #0a2a15;
    font-size: .6rem; font-weight: 700;
    padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .card-body { padding: 1rem; }
  .card-category {
    font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600; margin-bottom: 4px;
  }
  .card-name {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: .9rem;
    color: var(--text); line-height: 1.3; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-brand { font-size: .75rem; color: var(--text-dim); margin-bottom: 8px; }
  .card-rating {
    display: flex; align-items: center; gap: 5px; margin-bottom: 10px;
  }
  .card-stars { color: var(--gold); font-size: .8rem; }
  .card-rating-val { font-size: .75rem; font-weight: 600; }
  .card-reviews { font-size: .7rem; color: var(--text-dim); }
  .card-price { display: flex; flex-direction: column; gap: 2px; }
  .original-price {
    font-size: .75rem; color: var(--text-dim);
    text-decoration: line-through;
  }
  .final-price {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
    color: var(--text);
  }
  .discount-pct {
    display: inline-block; background: rgba(255,101,132,.2);
    color: var(--accent2); font-size: .65rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; margin-left: 4px;
  }
  .card-footer {
    padding: .75rem 1rem 1rem;
    display: flex; gap: 6px;
  }
  .btn-cart {
    flex: 1; padding: 9px; border-radius: 8px;
    background: var(--accent); border: none; color: white;
    font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-cart:hover { background: #5A52E0; transform: translateY(-1px); }
  .btn-fav {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; color: var(--text-dim); font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .btn-fav:hover, .btn-fav.active { background: rgba(255,101,132,.15); border-color: var(--accent2); color: var(--accent2); }

  /* LIST VIEW */
  .products-grid.list-view .product-card {
    display: grid; grid-template-columns: 140px 1fr auto;
  }
  .products-grid.list-view .card-image { height: 120px; width: 140px; }
  .products-grid.list-view .card-footer {
    flex-direction: column; justify-content: center; min-width: 140px;
    border-left: 1px solid var(--border); padding: 1rem;
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1; text-align: center; padding: 4rem 2rem;
  }
  .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: .3; }
  .empty-title {
    font-family: 'Syne', sans-serif; font-size: 1.2rem;
    color: var(--text-muted); margin-bottom: .5rem;
  }
  .empty-sub { font-size: .85rem; color: var(--text-dim); }

  /* CART PANEL */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity .3s; backdrop-filter: blur(4px);
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 400px;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 201; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  }
  .cart-overlay.open .cart-panel { transform: translateX(0); }
  .cart-header {
    padding: 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-title {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
  }
  .btn-close {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: all .15s;
  }
  .btn-close:hover { background: var(--accent2); border-color: var(--accent2); color: white; }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem; scrollbar-width: thin; }
  .cart-item {
    display: grid; grid-template-columns: 50px 1fr auto;
    gap: .75rem; padding: .75rem; border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: .75rem;
    background: var(--surface2); align-items: center;
  }
  .cart-item-emoji { font-size: 1.8rem; text-align: center; }
  .cart-item-name {
    font-size: .85rem; font-weight: 500; margin-bottom: 3px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cart-item-price { font-size: .8rem; color: var(--text-muted); }
  .cart-item-controls { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .qty-btn {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; color: var(--text); font-size: .9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .qty-btn:hover { background: var(--accent); border-color: var(--accent); }
  .qty-val { font-size: .85rem; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-empty {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-dim);
  }
  .cart-empty-icon { font-size: 3rem; opacity: .3; margin-bottom: 1rem; }
  .cart-footer {
    padding: 1.5rem; border-top: 1px solid var(--border);
  }
  .cart-summary { margin-bottom: 1rem; }
  .summary-row {
    display: flex; justify-content: space-between;
    font-size: .85rem; color: var(--text-muted); margin-bottom: 6px;
  }
  .summary-row.total {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 1.1rem; color: var(--text);
    border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px;
  }
  .btn-checkout {
    width: 100%; padding: 14px; border-radius: 10px;
    background: var(--accent); border: none; color: white;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-checkout:hover { background: #5A52E0; transform: translateY(-1px); }
  .btn-checkout:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; transform: none; }

  /* NOTIFICATION */
  .notification {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: white; padding: 12px 24px;
    border-radius: 50px; font-size: .85rem; font-weight: 500;
    z-index: 300; opacity: 0; transition: all .3s; pointer-events: none;
    white-space: nowrap; box-shadow: 0 8px 32px rgba(108,99,255,.4);
  }
  .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ACTIVE FILTERS BAR */
  .active-filters {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem;
  }
  .active-filter-tag {
    display: flex; align-items: center; gap: 5px;
    background: rgba(108,99,255,.15); border: 1px solid rgba(108,99,255,.3);
    color: #A8A2FF; padding: 4px 10px; border-radius: 20px;
    font-size: .75rem; font-weight: 500;
  }
  .tag-remove { cursor: pointer; opacity: .7; font-size: .8rem; }
  .tag-remove:hover { opacity: 1; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }
    aside { display: none; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      NEXUS
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar produtos, marcas...">
    </div>
    <div class="header-actions">
      <button class="btn-icon" title="Favoritos">❤️</button>
      <button class="btn-icon" id="cartBtn" title="Carrinho">
        🛒
        <span class="cart-badge hidden" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<div class="main-layout">
  <aside>
    <!-- Ordenação -->
    <div class="filter-section">
      <div class="filter-title">Ordenar por</div>
      <select class="sort-select" id="sortSelect">
        <option value="default">Relevância</option>
        <option value="price-asc">Menor Preço</option>
        <option value="price-desc">Maior Preço</option>
        <option value="rating">Melhor Avaliação</option>
        <option value="reviews">Mais Avaliados</option>
        <option value="name">Nome A-Z</option>
      </select>
    </div>

    <!-- Categorias -->
    <div class="filter-section">
      <div class="filter-title">Categoria</div>
      <div class="filter-options" id="categoryFilters"></div>
    </div>

    <!-- Faixa de Preço -->
    <div class="filter-section">
      <div class="filter-title">Faixa de Preço</div>
      <div class="price-range">
        <div class="price-inputs">
          <input type="number" class="price-input" id="priceMin" placeholder="R$ Mín" min="0">
          <span class="price-sep">—</span>
          <input type="number" class="price-input" id="priceMax" placeholder="R$ Máx" min="0">
        </div>
      </div>
    </div>

    <!-- Avaliação -->
    <div class="filter-section">
      <div class="filter-title">Avaliação mínima</div>
      <div class="rating-filters" id="ratingFilters">
        <div class="rating-option" data-rating="4.5" onclick="setRating(this)">
          <span class="stars">★★★★★</span><span class="rating-label">4.5+</span>
        </div>
        <div class="rating-option" data-rating="4.0" onclick="setRating(this)">
          <span class="stars">★★★★☆</span><span class="rating-label">4.0+</span>
        </div>
        <div class="rating-option" data-rating="3.5" onclick="setRating(this)">
          <span class="stars">★★★½☆</span><span class="rating-label">3.5+</span>
        </div>
      </div>
    </div>

    <!-- Toggles -->
    <div class="filter-section">
      <div class="filter-title">Filtros Especiais</div>
      <div class="toggle-group">
        <div class="toggle-item" id="toggleDestaque" onclick="toggleFilter('destaque')">
          <span class="toggle-label">⚡ Destaques</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item" id="toggleFrete" onclick="toggleFilter('frete')">
          <span class="toggle-label">🚚 Frete Grátis</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item" id="togglePromo" onclick="toggleFilter('promo')">
          <span class="toggle-label">🏷️ Promoção</span>
          <div class="toggle-switch"></div>
        </div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearFilters()">✕ Limpar todos os filtros</button>
  </aside>

  <main class="content">
    <div class="content-header">
      <div class="result-info" id="resultInfo">Carregando...</div>
      <div class="view-toggle">
        <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grade">⊞</button>
        <button class="view-btn" id="listBtn" onclick="setView('list')" title="Lista">≡</button>
      </div>
    </div>
    <div class="active-filters" id="activeFilters"></div>
    <div class="products-grid" id="productsGrid"></div>
  </main>
</div>

<!-- Cart -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <span class="cart-title">🛒 Meu Carrinho</span>
      <button class="btn-close" onclick="closeCartPanel()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-summary" id="cartSummary"></div>
      <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">
        💳 Finalizar Compra
      </button>
    </div>
  </div>
</div>

<div class="notification" id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ─── CONFIGURAÇÃO ──────────────────────────────────────────────────────────────
const EXCEL_FILE = 'produtos_ecommerce.xlsx'; // Excel deve estar na mesma pasta que este HTML
const N8N_WEBHOOK = 'https://automacoes.andresalvi.cloud/webhook-test/e-commerce';              // Substituir pela URL real do webhook n8n
// ──────────────────────────────────────────────────────────────────────────────

const EMOJIS = {
  "Eletrônicos": {"Computadores":"💻","Celulares":"📱","Áudio":"🎧","TVs":"📺","Câmeras":"📷","Wearables":"⌚"},
  "Esportes": {"Calçados":"👟","Acessórios":"🎒","Roupas":"👕","Ciclismo":"🚴","Nutrição":"💪"},
  "Casa": {"Móveis":"🛋️","Eletrodomésticos":"☕","Decoração":"💡"},
  "Livros": {"Tecnologia":"📚"},
  "Beleza": {"Fragrâncias":"🧴"},
  "Games": {"PS5":"🎮"}
};

// Mapeamento de colunas do Excel → propriedades internas
const COL_MAP = {
  'ID':                    'id',
  'Nome':                  'nome',
  'Categoria':             'cat',
  'Subcategoria':          'subcat',
  'Marca':                 'marca',
  'Preço (R$)':            'preco',
  'Preço Promocional (R$)':'precoPromo',
  'Estoque':               'estoque',
  'SKU':                   'sku',
  'Descrição':             'desc',
  'Avaliação (1-5)':       'avaliacao',
  'Nº Avaliações':         'numAval',
  'Peso (kg)':             'peso',
  'Cor':                   'cor',
  'Tamanho':               'tamanho',
  'Destaque':              'destaque',
  'Frete Grátis':          'frete',
};

let products = []; // preenchido dinamicamente via Excel

// State
let cart = [];
let favorites = new Set();
let filters = { cats: [], priceMin: null, priceMax: null, rating: null, destaque: false, frete: false, promo: false };
let searchQuery = '';
let sortBy = 'default';
let viewMode = 'grid';

function getEmoji(p) { return EMOJIS[p.cat]?.[p.subcat] || '📦'; }
function fmt(v) { return v.toLocaleString('pt-BR', {style:'currency',currency:'BRL'}); }
function stars(r) { let s=''; for(let i=1;i<=5;i++) s += i<=Math.floor(r)?'★':(i-r<1?'½':'☆'); return s; }
function discount(p) { if(!p.precoPromo) return 0; return Math.round((1-p.precoPromo/p.preco)*100); }

// Build category filters
function buildCategoryFilters() {
  const cats = {};
  products.forEach(p => { cats[p.cat] = (cats[p.cat]||0)+1; });
  const el = document.getElementById('categoryFilters');
  el.innerHTML = Object.entries(cats).map(([cat, count]) => `
    <div class="filter-chip ${filters.cats.includes(cat)?'active':''}" onclick="toggleCat('${cat}')">
      <span>${cat}</span>
      <span class="filter-count">${count}</span>
    </div>
  `).join('');
}

function toggleCat(cat) {
  if(filters.cats.includes(cat)) filters.cats = filters.cats.filter(c=>c!==cat);
  else filters.cats.push(cat);
  buildCategoryFilters();
  render();
}

function setRating(el) {
  const v = parseFloat(el.dataset.rating);
  if(filters.rating === v) filters.rating = null;
  else filters.rating = v;
  document.querySelectorAll('.rating-option').forEach(e => e.classList.remove('active'));
  if(filters.rating) el.classList.add('active');
  render();
}

function toggleFilter(type) {
  filters[type] = !filters[type];
  document.getElementById('toggle'+type.charAt(0).toUpperCase()+type.slice(1)).classList.toggle('active', filters[type]);
  render();
}

function clearFilters() {
  filters = { cats: [], priceMin: null, priceMax: null, rating: null, destaque: false, frete: false, promo: false };
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('sortSelect').value = 'default';
  sortBy = 'default';
  document.querySelectorAll('.filter-chip,.rating-option,.toggle-item').forEach(e=>e.classList.remove('active'));
  buildCategoryFilters();
  render();
}

function setView(v) {
  viewMode = v;
  document.getElementById('gridBtn').classList.toggle('active', v==='grid');
  document.getElementById('listBtn').classList.toggle('active', v==='list');
  const grid = document.getElementById('productsGrid');
  grid.classList.toggle('list-view', v==='list');
}

function getFilteredProducts() {
  let arr = [...products];
  if(searchQuery) arr = arr.filter(p => p.nome.toLowerCase().includes(searchQuery) || p.marca.toLowerCase().includes(searchQuery) || p.cat.toLowerCase().includes(searchQuery));
  if(filters.cats.length) arr = arr.filter(p => filters.cats.includes(p.cat));
  if(filters.priceMin) arr = arr.filter(p => (p.precoPromo||p.preco) >= filters.priceMin);
  if(filters.priceMax) arr = arr.filter(p => (p.precoPromo||p.preco) <= filters.priceMax);
  if(filters.rating) arr = arr.filter(p => p.avaliacao >= filters.rating);
  if(filters.destaque) arr = arr.filter(p => p.destaque);
  if(filters.frete) arr = arr.filter(p => p.frete);
  if(filters.promo) arr = arr.filter(p => p.precoPromo);
  // Sort
  if(sortBy==='price-asc') arr.sort((a,b)=>(a.precoPromo||a.preco)-(b.precoPromo||b.preco));
  else if(sortBy==='price-desc') arr.sort((a,b)=>(b.precoPromo||b.preco)-(a.precoPromo||a.preco));
  else if(sortBy==='rating') arr.sort((a,b)=>b.avaliacao-a.avaliacao);
  else if(sortBy==='reviews') arr.sort((a,b)=>b.numAval-a.numAval);
  else if(sortBy==='name') arr.sort((a,b)=>a.nome.localeCompare(b.nome));
  return arr;
}

function renderActiveFilters() {
  const tags = [];
  filters.cats.forEach(c => tags.push({label: c, remove: ()=>toggleCat(c)}));
  if(filters.rating) tags.push({label: `★ ${filters.rating}+`, remove: ()=>{filters.rating=null;document.querySelectorAll('.rating-option').forEach(e=>e.classList.remove('active'));render();}});
  if(filters.destaque) tags.push({label:'⚡ Destaques',remove:()=>toggleFilter('destaque')});
  if(filters.frete) tags.push({label:'🚚 Frete Grátis',remove:()=>toggleFilter('frete')});
  if(filters.promo) tags.push({label:'🏷️ Promoção',remove:()=>toggleFilter('promo')});
  if(searchQuery) tags.push({label:`"${searchQuery}"`,remove:()=>{searchQuery='';document.getElementById('searchInput').value='';render();}});
  const el = document.getElementById('activeFilters');
  el.innerHTML = tags.map((t,i)=>`
    <div class="active-filter-tag">${t.label}<span class="tag-remove" onclick="activeFilterRemove(${i})">✕</span></div>
  `).join('');
  window._activeFilterRemovers = tags.map(t=>t.remove);
}

window.activeFilterRemove = function(i) { window._activeFilterRemovers[i](); }

function render() {
  renderActiveFilters();
  const arr = getFilteredProducts();
  document.getElementById('resultInfo').innerHTML = `<strong>${arr.length}</strong> produto${arr.length!==1?'s':''} encontrado${arr.length!==1?'s':''}`;
  const grid = document.getElementById('productsGrid');
  if(!arr.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Nenhum produto encontrado</div><div class="empty-sub">Tente ajustar os filtros ou termos de busca</div></div>`;
    return;
  }
  grid.innerHTML = arr.map(p => {
    const finalPrice = p.precoPromo || p.preco;
    const disc = discount(p);
    const isFav = favorites.has(p.id);
    return `
    <div class="product-card" onclick="/* nothing */">
      <div class="card-image">
        ${getEmoji(p)}
        ${p.destaque?'<div class="badge-destaque">⚡ Destaque</div>':''}
        ${disc>0?`<div class="badge-promo">-${disc}%</div>`:''}
        ${p.frete?'<div class="badge-frete">🚚 Frete Grátis</div>':''}
      </div>
      <div class="card-body">
        <div class="card-category">${p.cat} · ${p.subcat}</div>
        <div class="card-name">${p.nome}</div>
        <div class="card-brand">${p.marca}</div>
        <div class="card-rating">
          <span class="card-stars">${stars(p.avaliacao)}</span>
          <span class="card-rating-val">${p.avaliacao}</span>
          <span class="card-reviews">(${p.numAval.toLocaleString()})</span>
        </div>
        <div class="card-price">
          ${p.precoPromo ? `<span class="original-price">${fmt(p.preco)}</span>` : ''}
          <span class="final-price">${fmt(finalPrice)}${disc>0?`<span class="discount-pct">-${disc}%</span>`:''}</span>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-cart" onclick="addToCart(${p.id})">🛒 Adicionar</button>
        <button class="btn-fav ${isFav?'active':''}" onclick="toggleFav(${p.id})" title="${isFav?'Remover dos favoritos':'Adicionar aos favoritos'}">${isFav?'❤️':'🤍'}</button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id) {
  const p = products.find(x=>x.id===id);
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  updateCartBadge();
  renderCart();
  notify(`✓ ${p.nome} adicionado ao carrinho`);
}

function toggleFav(id) {
  if(favorites.has(id)) favorites.delete(id); else favorites.add(id);
  render();
}

function updateCartBadge() {
  const total = cart.reduce((s,x)=>s+x.qty,0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('hidden', total===0);
}

function renderCart() {
  const el = document.getElementById('cartItems');
  if(!cart.length) {
    el.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>Carrinho vazio</div><div style="font-size:.8rem;margin-top:.5rem;color:var(--text-dim)">Adicione produtos para começar</div></div>`;
    document.getElementById('cartSummary').innerHTML = '';
    document.getElementById('checkoutBtn').disabled = true;
    return;
  }
  el.innerHTML = cart.map(item=>`
    <div class="cart-item">
      <div class="cart-item-emoji">${getEmoji(item)}</div>
      <div>
        <div class="cart-item-name">${item.nome}</div>
        <div class="cart-item-price">${fmt(item.precoPromo||item.preco)} × ${item.qty} = ${fmt((item.precoPromo||item.preco)*item.qty)}</div>
      </div>
      <div class="cart-item-controls">
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
      </div>
    </div>
  `).join('');
  const subtotal = cart.reduce((s,x)=>s+(x.precoPromo||x.preco)*x.qty,0);
  const freteLivre = cart.some(x=>x.frete);
  const frete = freteLivre ? 0 : 29.90;
  const total = subtotal + frete;
  document.getElementById('cartSummary').innerHTML = `
    <div class="summary-row"><span>Subtotal (${cart.reduce((s,x)=>s+x.qty,0)} item${cart.reduce((s,x)=>s+x.qty,0)!==1?'s':''})</span><span>${fmt(subtotal)}</span></div>
    <div class="summary-row"><span>Frete</span><span style="color:${frete===0?'var(--accent3)':'inherit'}">${frete===0?'Grátis':fmt(frete)}</span></div>
    <div class="summary-row total"><span>Total</span><span style="color:var(--accent)">${fmt(total)}</span></div>
  `;
  document.getElementById('checkoutBtn').disabled = false;
}

function changeQty(id, delta) {
  const idx = cart.findIndex(x=>x.id===id);
  if(idx===-1) return;
  cart[idx].qty += delta;
  if(cart[idx].qty <= 0) cart.splice(idx,1);
  updateCartBadge();
  renderCart();
}

function openCart() { document.getElementById('cartOverlay').classList.add('open'); }
function closeCartPanel() { document.getElementById('cartOverlay').classList.remove('open'); }
function closeCart(e) { if(e.target===document.getElementById('cartOverlay')) closeCartPanel(); }

// ─── CHECKOUT → WEBHOOK N8N ───────────────────────────────────────────────────
async function checkout() {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Enviando pedido...';

  const subtotal = cart.reduce((s,x) => s + (x.precoPromo||x.preco)*x.qty, 0);
  const freteLivre = cart.some(x => x.frete);
  const frete = freteLivre ? 0 : 29.90;

  const payload = {
    pedido_id:   `PED-${Date.now()}`,
    data_hora:   new Date().toISOString(),
    itens: cart.map(item => ({
      id:          item.id,
      sku:         item.sku || null,
      nome:        item.nome,
      categoria:   item.cat,
      subcategoria:item.subcat,
      marca:       item.marca,
      preco_unit:  item.precoPromo || item.preco,
      quantidade:  item.qty,
      subtotal:    parseFloat(((item.precoPromo||item.preco) * item.qty).toFixed(2)),
    })),
    resumo: {
      total_itens: cart.reduce((s,x) => s+x.qty, 0),
      subtotal:    parseFloat(subtotal.toFixed(2)),
      frete:       parseFloat(frete.toFixed(2)),
      total:       parseFloat((subtotal + frete).toFixed(2)),
      frete_gratis:freteLivre,
    }
  };

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    notify('🎉 Pedido enviado com sucesso! Obrigado pela compra.');
    cart = [];
    updateCartBadge();
    renderCart();
    closeCartPanel();
  } catch (err) {
    console.error('Erro ao enviar pedido:', err);
    notify('❌ Erro ao enviar pedido. Tente novamente.');
    btn.disabled = false;
    btn.innerHTML = '💳 Finalizar Compra';
  }
}

// ─── CARREGAMENTO DO EXCEL ────────────────────────────────────────────────────
function parseExcelRow(row) {
  const p = {};
  for (const [excelCol, prop] of Object.entries(COL_MAP)) {
    p[prop] = row[excelCol] !== undefined ? row[excelCol] : null;
  }
  // Normaliza tipos
  p.id        = Number(p.id);
  p.preco     = parseFloat(p.preco) || 0;
  p.precoPromo= p.precoPromo ? parseFloat(p.precoPromo) : null;
  p.estoque   = parseInt(p.estoque) || 0;
  p.avaliacao = parseFloat(p.avaliacao) || 0;
  p.numAval   = parseInt(p.numAval) || 0;
  p.destaque  = String(p.destaque).trim().toLowerCase() === 'sim';
  p.frete     = String(p.frete).trim().toLowerCase() === 'sim';
  return p;
}

async function loadProductsFromExcel() {
  showLoading(true);
  try {
    const res = await fetch(EXCEL_FILE);
    if (!res.ok) throw new Error(`Não foi possível carregar "${EXCEL_FILE}" (${res.status})`);

    const buffer    = await res.arrayBuffer();
    const workbook  = XLSX.read(buffer, { type: 'array' });
    const sheet     = workbook.Sheets['Produtos'];

    if (!sheet) throw new Error('Aba "Produtos" não encontrada no Excel.');

    const rows = XLSX.utils.sheet_to_json(sheet, { defval: null });
    products   = rows.map(parseExcelRow).filter(p => p.id && p.nome);

    console.log(`✅ ${products.length} produto(s) carregado(s) do Excel.`);
    showLoading(false);
    buildCategoryFilters();
    render();
    renderCart();
  } catch (err) {
    console.error('Erro ao carregar Excel:', err);
    showLoading(false);
    document.getElementById('productsGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Erro ao carregar produtos</div>
        <div class="empty-sub">${err.message}<br><br>
          Certifique-se que <strong>${EXCEL_FILE}</strong> está na mesma pasta que este HTML<br>
          e que você está abrindo via servidor web (não diretamente pelo navegador).
        </div>
      </div>`;
    document.getElementById('resultInfo').innerHTML = '<strong>0</strong> produtos';
  }
}

function showLoading(on) {
  document.getElementById('resultInfo').innerHTML = on
    ? '⏳ Carregando produtos do Excel...'
    : '';
  if (on) {
    document.getElementById('productsGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" style="animation:spin 1s linear infinite;display:inline-block">⏳</div>
        <div class="empty-title">Carregando catálogo...</div>
      </div>`;
  }
}

let notifTimer;
function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Event listeners
document.getElementById('cartBtn').addEventListener('click', openCart);
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase().trim(); render(); });
document.getElementById('sortSelect').addEventListener('change', e => { sortBy = e.target.value; render(); });
document.getElementById('priceMin').addEventListener('change', e => { filters.priceMin = e.target.value ? parseFloat(e.target.value) : null; render(); });
document.getElementById('priceMax').addEventListener('change', e => { filters.priceMax = e.target.value ? parseFloat(e.target.value) : null; render(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadProductsFromExcel();
</script>
</body>

</html>
